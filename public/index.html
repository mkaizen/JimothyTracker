<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jimothy Tracker 🦝 — Seattle Raccoon Sightings</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>🦝 Jimothy Tracker</h1>
    <nav class="nav">
      <a href="/" class="active">Map</a>
      <a href="/feed">Feed</a>
    </nav>
    <p class="tagline">Where has Seattle's favorite raccoon been spotted?</p>
    <button id="report-btn" class="btn-primary">+ Report a sighting</button>
  </header>

  <main>
    <div id="map"></div>

    <aside id="sidebar">
      <div class="sidebar-header">
        <h2>Recent sightings</h2>
        <span id="count" class="count"></span>
      </div>
      <ul id="sightings-list"></ul>
    </aside>
  </main>

  <footer class="footer">
    <p>Made by Matthew Bowman</p>
  </footer>

  <!-- Report form (hidden until "Report a sighting") -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <button id="modal-close" class="modal-close" aria-label="Close">×</button>
      <h2>Report a Jimothy sighting</h2>
      <p class="hint">Click the map to drop a pin, or type a location / upload a geotagged photo.</p>

      <form id="report-form">
        <label>When did you see him? *
          <input type="datetime-local" name="seen_at" required />
        </label>

        <div class="loc-row">
          <label class="loc-picked">Location
            <output id="loc-display">Click the map to set a spot…</output>
          </label>
        </div>

        <label>…or type a place
          <input type="text" name="location_text" placeholder="e.g. Cal Anderson Park" />
        </label>

        <label>Notes
          <textarea name="notes" rows="2" placeholder="What was he up to?"></textarea>
        </label>

        <label>Photo (optional — GPS is read automatically if present)
          <input type="file" name="photo" accept="image/*" />
        </label>

        <label>Your name (optional)
          <input type="text" name="reporter" placeholder="anonymous raccoon fan" />
        </label>

        <p id="form-error" class="form-error hidden"></p>
        <button type="submit" class="btn-primary">Submit sighting</button>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="/app.js"></script>
</body>
</html>
