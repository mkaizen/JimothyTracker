    <rect x="23" y="35" width="4.5" height="12" rx="2.2"/>
    <rect x="30" y="36" width="4.5" height="11" rx="2.2"/>
    <rect x="37" y="36" width="4.5" height="11" rx="2.2"/>
    <rect x="43" y="35" width="4.5" height="12" rx="2.2"/>
  </g>
  <!-- bushy ringed tail -->
  <path d="M21 36 C9 38 2 31 3 21 C3.5 14 9 11 14 14 C11 17 12 22 17 24 C14 26 14 31 19 32 C21 30 22 33 23 37 Z" fill="#8b9096"/>
  <path d="M3 20 C3 15 6 12 10 12 C8 15 7 18 9 21 C6 22 4 22 3 20 Z" fill="#2a2a2e"/>
  <path d="M9 25 C11 22 14 22 16 25 L14 28 C12 25 11 25 9 27 Z" fill="#2a2a2e"/>
  <!-- tall hunched back (shortened spine) -->
  <path d="M17 38 C15 18 24 10 32 10 C43 10 49 20 49 31 C49 35 46 38 42 38 L21 38 C18 38 17 38 17 38 Z" fill="#8b9096"/>
  <!-- head carried low at the front, snout down -->
