  <!-- rounded ear -->
  <path d="M42 25 C42.5 18 45.5 16 47.5 18 C49 20 49.5 22 50 24 C47 25 44 25 42 25 Z" fill="#8b9096"/>
  <path d="M44 23 C44.5 19.5 46 18.5 47 19.5 C47.8 20.5 48 22 48.2 23 C46.5 23.5 45 23.5 44 23 Z" fill="#3a3a40"/>
  <!-- face mask -->
  <path d="M45 29 C50 28 54 30 55 34 C52 35 47 34 45 32 Z" fill="#2a2a2e"/>
  <!-- light muzzle -->
  <path d="M53 35 C56 35 57 36 57 37 C57 39 55 40 52 39 C51.5 38 52 36 53 35 Z" fill="#e8eaed"/>
  <!-- nose -->
  <circle cx="56" cy="37" r="1.6" fill="#1c1c1e"/>
  <!-- eye -->
  <circle cx="48.5" cy="31" r="1.3" fill="#f0f0f0"/>
</svg>
